"""
TD Ameritrade (now Schwab) — Conceptual GraphQL Schema
Developer portal: https://developer.tdameritrade.com/
Successor: https://developer.schwab.com/
API shutdown date: May 10, 2024
"""

# ---------------------------------------------------------------------------
# Scalars
# ---------------------------------------------------------------------------

scalar DateTime
scalar Date
scalar JSON

# ---------------------------------------------------------------------------
# Enums
# ---------------------------------------------------------------------------

enum AssetType {
  EQUITY
  OPTION
  MUTUAL_FUND
  FIXED_INCOME
  CASH_EQUIVALENT
  ETF
  FOREX
  FUTURE
  FUTURE_OPTION
  INDEX
  CURRENCY
}

enum OrderType {
  MARKET
  LIMIT
  STOP
  STOP_LIMIT
  TRAILING_STOP
  MARKET_ON_CLOSE
  EXERCISE
  TRAILING_STOP_LIMIT
  NET_DEBIT
  NET_CREDIT
  NET_ZERO
}

enum OrderStatus {
  AWAITING_PARENT_ORDER
  AWAITING_CONDITION
  AWAITING_MANUAL_REVIEW
  ACCEPTED
  AWAITING_UR_OUT
  PENDING_ACTIVATION
  QUEUED
  WORKING
  REJECTED
  PENDING_CANCEL
  CANCELLED
  PENDING_REPLACE
  REPLACED
  FILLED
  EXPIRED
}

enum OrderInstruction {
  BUY
  SELL
  BUY_TO_COVER
  SELL_SHORT
  BUY_TO_OPEN
  BUY_TO_CLOSE
  SELL_TO_OPEN
  SELL_TO_CLOSE
  EXCHANGE
}

enum Session {
  NORMAL
  AM
  PM
  SEAMLESS
}

enum Duration {
  DAY
  GOOD_TILL_CANCEL
  FILL_OR_KILL
}

enum ComplexOrderStrategyType {
  NONE
  COVERED
  VERTICAL
  BACK_RATIO
  CALENDAR
  DIAGONAL
  STRADDLE
  STRANGLE
  COLLAR_SYNTHETIC
  BUTTERFLY
  CONDOR
  IRON_CONDOR
  VERTICAL_ROLL
  COLLAR_WITH_STOCK
  DOUBLE_DIAGONAL
  UNBALANCED_BUTTERFLY
  UNBALANCED_CONDOR
  UNBALANCED_IRON_CONDOR
  UNBALANCED_VERTICAL_ROLL
  CUSTOM
}

enum TransactionType {
  TRADE
  RECEIVE_AND_DELIVER
  DIVIDEND_OR_INTEREST
  ACH_RECEIPT
  ACH_DISBURSEMENT
  CASH_RECEIPT
  CASH_DISBURSEMENT
  ELECTRONIC_FUND
  WIRE_OUT
  WIRE_IN
  JOURNAL
  MEMORANDUM
  MARGIN_CALL
  MONEY_MARKET
  SMA_ADJUSTMENT
}

enum OptionPutCall {
  PUT
  CALL
}

enum MarketType {
  EQUITY
  OPTION
  FUTURE
  BOND
  FOREX
}

enum PeriodType {
  DAY
  MONTH
  YEAR
  YTD
}

enum FrequencyType {
  MINUTE
  DAILY
  WEEKLY
  MONTHLY
}

# ---------------------------------------------------------------------------
# Interfaces
# ---------------------------------------------------------------------------

interface Account {
  accountId: String!
  type: String!
  roundTrips: Int
  isDayTrader: Boolean
  isClosingOnlyRestricted: Boolean
  positions: [Position!]
  orderStrategies: [PlacedOrder!]
  initialBalances: AccountBalance
  currentBalances: AccountBalance
  projectedBalances: AccountBalance
}

interface OrderRecord {
  orderId: String!
  orderType: OrderType!
  session: Session!
  duration: Duration!
  orderStrategyType: String!
  cancelable: Boolean
  editable: Boolean
  status: OrderStatus!
  enteredTime: DateTime
  closeTime: DateTime
  tag: String
  accountId: String
  orderLegCollection: [OrderLeg!]
  orderActivityCollection: [JSON]
}

