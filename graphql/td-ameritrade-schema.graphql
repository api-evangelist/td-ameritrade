# ---------------------------------------------------------------------------
# Root Operations
# ---------------------------------------------------------------------------

type Query {
  # Accounts
  account(accountId: String!): Account
  accounts: [Account!]!

  # Orders
  orders(accountId: String!, maxResults: Int, fromEnteredTime: DateTime, toEnteredTime: DateTime, status: OrderStatus): [AnyOrder!]!
  order(accountId: String!, orderId: String!): AnyOrder

  # Transactions
  transactions(accountId: String!, type: TransactionType, symbol: String, startDate: Date, endDate: Date): [Transaction!]!
  transaction(accountId: String!, transactionId: String!): Transaction

  # Watchlists
  watchlists(accountId: String!): [WatchList!]!
  watchlist(accountId: String!, watchlistId: String!): WatchList

  # Market Data
  quote(symbol: String!): Quote
  quotes(symbols: [String!]!): [Quote!]!
  optionChain(symbol: String!, contractType: OptionPutCall, strikeCount: Int, includeQuotes: Boolean, strategy: String, interval: Float, strike: Float, range: String, fromDate: Date, toDate: Date, volatility: Float, underlyingPrice: Float, interestRate: Float, daysToExpiration: Int, expMonth: String, optionType: String): OptionChain
  priceHistory(symbol: String!, periodType: PeriodType, period: Int, frequencyType: FrequencyType, frequency: Int, startDate: Float, endDate: Float, needExtendedHoursData: Boolean): PriceHistory
  movers(index: String!, direction: String, change: String): [TopMover!]!
  marketHours(markets: [MarketType!]!, date: Date): [MarketHour!]!

  # Instruments
  instrument(cusip: String!): Instrument
  searchInstruments(symbol: String!, projection: String!): [Instrument!]!
  fundamentals(symbol: String!): FundamentalData

  # User
  userPrincipals(fields: [String!]): UserPrincipals!

  # Forex and Futures
  forexQuote(symbol: String!): Forex
  futureQuote(symbol: String!): Future
}

type Mutation {
  # Orders
  placeOrder(accountId: String!, order: JSON!): PlacedOrder
  replaceOrder(accountId: String!, orderId: String!, order: JSON!): PlacedOrder
  cancelOrder(accountId: String!, orderId: String!): Boolean

  # Saved Orders
  placeSavedOrder(accountId: String!, order: JSON!): PlacedOrder
  deleteSavedOrder(accountId: String!, savedOrderId: String!): Boolean

  # Watchlists
  createWatchlist(accountId: String!, name: String!, watchlistItems: [JSON!]!): WatchList
  updateWatchlist(accountId: String!, watchlistId: String!, watchlistItems: [JSON!]!): WatchList
  replaceWatchlist(accountId: String!, watchlistId: String!, name: String!, watchlistItems: [JSON!]!): WatchList
  deleteWatchlist(accountId: String!, watchlistId: String!): Boolean

  # User Preferences
  updatePreferences(accountId: String!, preferences: JSON!): Boolean
}
